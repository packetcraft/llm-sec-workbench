name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    name: Lint & Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Install CPU-only PyTorch to avoid multi-GB CUDA downloads in CI
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements.txt

      - name: Lint with Ruff
        run: |
          pip install ruff
          ruff check .

      - name: Run tests
        env:
          # Point at a non-existent host so any test that accidentally tries
          # to reach Ollama fails fast and clearly rather than hanging.
          OLLAMA_HOST: "http://localhost:0"
          PANW_API_KEY: "ci-placeholder"
        run: |
          pytest --tb=short -q

  # Separate job — only checks that Docker build succeeds, no push
  docker-build:
    name: Docker build check
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image
        run: docker build -t llm-sec-workbench:ci .
