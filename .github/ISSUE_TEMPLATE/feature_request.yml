name: Feature Request
description: Propose a new gate, UI feature, or capability.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion! Please describe the use case clearly so we can evaluate it in the context of the pipeline architecture.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the gap or limitation you are running into.
      placeholder: "There is no way to test indirect prompt injection through a simulated vector database retrieval step..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe the feature. If it involves a new gate, specify where in the pipeline it should sit and what it would scan.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What workarounds or alternatives did you consider?

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - New security gate
        - Pipeline / core
        - Red teaming engine
        - UI / telemetry
        - Configuration / deployment
        - Documentation
        - Other
    validations:
      required: true
