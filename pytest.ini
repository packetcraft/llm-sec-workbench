[pytest]
# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output
addopts =
    --tb=short
    --strict-markers
    -q

# Custom markers
markers =
    unit: Pure unit tests with no external dependencies (Ollama, cloud APIs).
    integration: Tests that require a live Ollama instance.
    slow: Tests with significant runtime (large model loads, batch fuzzing).

# Treat unregistered markers as errors
filterwarnings =
    error::pytest.PytestUnraisableExceptionWarning
