name: Bug Report
description: Something is broken or behaving unexpectedly.
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report. Please fill out every section so we can reproduce and fix the issue quickly.

        > **Security issue?** Do NOT use this form. See [SECURITY.md](../SECURITY.md) for private disclosure.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: "When I set Gate 2 to ENFORCE and submit a prompt with PII, the app throws a KeyError instead of blocking..."
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Exact steps to trigger the bug.
      value: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened?
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or error output
      description: Paste any stack traces or terminal output here.
      render: shell

  - type: input
    id: commit
    attributes:
      label: Commit / version
      placeholder: "e.g. main@a1b2c3d or v0.3.0"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - Windows
        - macOS
        - Linux
    validations:
      required: true

  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "e.g. 3.11.4"
    validations:
      required: true

  - type: input
    id: ollama
    attributes:
      label: Ollama version
      placeholder: "e.g. 0.1.38  (run: ollama --version)"
